name: Notion Client Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Monitor Notion Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run monitor script
        id: monitor
        run: |
          chmod +x scripts/notion-monitor.sh
          bash scripts/notion-monitor.sh 2>&1 | tee monitor-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create or update issue if changes detected
        if: steps.monitor.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('monitor-output.txt', 'utf8');
            const date = new Date().toISOString().slice(0, 10);

            // Check for existing open issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'notion-change',
              state: 'open',
              per_page: 1
            });

            const body = [
              '## Notion Client-Side Change Detected',
              '',
              'The daily monitor has detected changes in Notion\'s client-side code that may affect Worknot\'s proxy functionality.',
              '',
              '### Details',
              '',
              '```',
              output,
              '```',
              '',
              '### Action Required',
              '',
              '1. Review the changes above',
              '2. Test Worknot proxy against a live Notion site',
              '3. Update `baselines/notion-snapshot.json` if changes are benign',
              '4. Fix proxy logic in `src/code.ts` if breaking changes found',
            ].join('\n');

            if (existing.data.length > 0) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### Update ${date}\n\n` + body
              });
              console.log(`Added comment to existing issue #${existing.data[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Notion client-side change detected - ${date}`,
                body: body,
                labels: ['notion-change']
              });
              console.log('Created new issue');
            }
